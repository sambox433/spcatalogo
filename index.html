<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaokê + YouTube - GarraPlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .active-mode { background-color: #eab308 !important; color: black !important; font-weight: 700; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen bg-zinc-950">
        <div class="bg-zinc-900 rounded-3xl shadow-2xl w-full max-w-md p-8 text-center">
            <div class="mx-auto w-24 h-24 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center mb-6">
                <i class="fa-solid fa-key text-5xl text-black"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">Bem-vindo ao Karaokê Online</h1>
            <p class="text-zinc-400 mb-8">Digite seu ID de pareamento</p>
            
            <input id="pairingInput" 
                   type="text" 
                   placeholder="🗝️ ID PAREAMENTO"
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-yellow-400 mb-6">
            
            <button onclick="fazerLogin()"
                    class="w-full bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl font-bold text-lg transition">
                ENTRAR
            </button>
        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="mainScreen" class="hidden min-h-screen">
        <!-- Header -->
        <div class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-3xl">🎤</span>
                    <h1 class="text-2xl font-bold text-yellow-400">GarraKaraokê</h1>
                </div>
                <div class="flex gap-3">
                    <button onclick="setMode(1)" id="btnKaraoke"
                            class="px-8 py-3 rounded-2xl font-semibold flex items-center gap-2 active-mode">
                        <i class="fa-solid fa-microphone"></i> KARAOKE
                    </button>
                    <button onclick="setMode(2)" id="btnYoutube"
                            class="px-8 py-3 rounded-2xl font-semibold flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700">
                        <i class="fa-brands fa-youtube"></i> YOUTUBE
                    </button>
                </div>
                <button onclick="cancelarMusica()" 
                        class="bg-red-600 hover:bg-red-500 px-6 py-3 rounded-2xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-ban"></i> CANCELAR MÚSICA
                </button>
            </div>
        </div>

        <!-- Barra de busca -->
        <div class="max-w-6xl mx-auto px-6 py-8">
            <div class="flex gap-4">
                <input id="searchInput" 
                       type="text" 
                       value="cassia"
                       placeholder="Digite o nome da música ou artista..."
                       class="flex-1 bg-zinc-900 border border-zinc-700 rounded-3xl px-8 py-5 text-lg focus:outline-none focus:border-yellow-400">
                <button onclick="buscar()" 
                        class="bg-yellow-400 hover:bg-yellow-300 text-black font-bold px-12 rounded-3xl text-lg flex items-center gap-3">
                    <i class="fa-solid fa-magnifying-glass"></i> PESQUISAR
                </button>
            </div>
        </div>

        <!-- Resultados -->
        <div class="max-w-6xl mx-auto px-6">
            <div id="loading" class="hidden text-center py-12 text-yellow-400 text-xl">
                <i class="fa-solid fa-spinner fa-spin mr-3"></i> Buscando...
            </div>
            
            <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Cards gerados pelo JS -->
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAÇÃO -->
    <div id="modalConfirm" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
        <div class="modal bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-center mb-6 text-yellow-400">CONFIRMAR ENVIO</h2>
                <div id="modalText" class="text-center text-lg leading-relaxed min-h-[120px] text-zinc-300">
                </div>
            </div>
            
            <div class="grid grid-cols-2 border-t border-zinc-700">
                <button onclick="fecharModal()" 
                        class="py-6 text-red-400 font-bold hover:bg-zinc-800 transition">CANCELAR</button>
                <button onclick="confirmarEnvio()" 
                        class="py-6 bg-emerald-500 text-black font-bold hover:bg-emerald-400 transition">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script>
        // ====================== CONFIGURAÇÕES ======================
        const CHAMADA_KARAOKE = "https://script.google.com/macros/s/AKfycbzls4exI8TPw492Cx5RosSRbF10S4J-zEJkEBbyvFqZIXjGn9lWYGzTdGrq5qq2TwD7/exec?pesquisa=";
        const URL_YOUTUBE_BASE = "https://sbx.garraplay.shop/search?q=";
        const URL_ENVIAR = "https://script.google.com/macros/s/AKfycbxrlggLTeIXvbeP0T4RI4uIKgfO2sJsRiTtnXqixaEBnA2FYxLXS0MLCz55aMbe2iSl/exec?id=";
        
        let pairingId = "";
        let currentMode = 2; // 1 = Karaoke, 2 = YouTube
        let currentSelected = null;

        // ====================== LOGIN ======================
        function fazerLogin() {
            const input = document.getElementById("pairingInput");
            const id = input.value.trim();
            if (!id) return alert("Digite seu ID de pareamento!");
            
            pairingId = id;
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("mainScreen").classList.remove("hidden");
            setMode(2);
            setTimeout(buscar, 300);
        }

        // ====================== MODO ======================
        function setMode(mode) {
            currentMode = mode;
            document.getElementById("btnKaraoke").classList.toggle("active-mode", mode === 1);
            document.getElementById("btnYoutube").classList.toggle("active-mode", mode === 2);
        }

        // ====================== BUSCAR (PROXY ATUALIZADO - allorigins.win) ======================
        async function buscar() {
            const query = document.getElementById("searchInput").value.trim();
            if (!query) return alert("Digite algo para pesquisar!");

            const loading = document.getElementById("loading");
            const resultsDiv = document.getElementById("results");
            loading.classList.remove("hidden");
            resultsDiv.innerHTML = "";

            try {
                let data;
                
                if (currentMode === 1) {
                    // KARAOKE (sem proxy)
                    const url = CHAMADA_KARAOKE + encodeURIComponent(query);
                    const res = await fetch(url);
                    data = await res.json();
                    renderCards(data, 1);
                } else {
                    // YOUTUBE → PROXY allorigins.win (mais estável que corsproxy.io)
                    const apiUrl = URL_YOUTUBE_BASE + encodeURIComponent(query);
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                    
                    const res = await fetch(proxyUrl);
                    if (!res.ok) throw new Error("Proxy falhou");

                    const proxyData = await res.json();
                    if (!proxyData.contents) throw new Error("Resposta vazia");

                    const json = JSON.parse(proxyData.contents);
                    data = json.results || [];
                    renderCards(data, 2);
                }
            } catch (e) {
                console.error(e);
                resultsDiv.innerHTML = `<p class="col-span-full text-center py-20 text-red-400">❌ Erro na busca YouTube.<br>Proxy allorigins.win ativado.<br>Tente novamente ou teste com outra palavra.</p>`;
            } finally {
                loading.classList.add("hidden");
            }
        }

        // ====================== RENDER CARDS ======================
        function renderCards(items, mode) {
            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "";
            
            if (!items || items.length === 0) {
                resultsDiv.innerHTML = `<p class="col-span-full text-center py-20 text-zinc-400">Nenhum resultado encontrado</p>`;
                return;
            }
            
            items.forEach(item => {
                let cardHTML = "";
                
                if (mode === 1) {
                    cardHTML = `
                        <div onclick="abrirConfirmacao(${JSON.stringify(item)})" 
                             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer border border-zinc-700">
                            <div class="p-6">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-bold text-lg">${item.CANTOR || item.cantor || 'Desconhecido'}</p>
                                        <p class="text-yellow-400 mt-1 line-clamp-2">${item.MUSICA || item.musica}</p>
                                    </div>
                                    <div class="bg-emerald-500 text-black text-xs font-mono px-3 py-1 rounded-full">
                                        ${item.NUMERO || item.numero}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                } else {
                    cardHTML = `
                        <div onclick="abrirConfirmacao(${JSON.stringify(item)})" 
                             class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                            <div class="relative">
                                <img src="${item.thumbnail}" class="w-full aspect-video object-cover">
                                <div class="absolute bottom-3 right-3 bg-black/80 text-white text-xs px-3 py-1 rounded font-mono">
                                    ${item.duration}
                                </div>
                            </div>
                            <div class="p-5">
                                <p class="line-clamp-3 font-medium leading-tight">${item.title}</p>
                            </div>
                        </div>`;
                }
                
                resultsDiv.innerHTML += cardHTML;
            });
        }

        // ====================== MODAL ======================
        function abrirConfirmacao(item) {
            currentSelected = item;
            let html = currentMode === 1 
                ? `<strong class="text-emerald-400">KARAOKE</strong><br><span class="text-2xl">${item.CANTOR || item.cantor}</span><br><br><span class="text-xl">${item.MUSICA || item.musica}</span><br><span class="text-sm text-zinc-500">Código: ${item.NUMERO || item.numero}</span>`
                : `<strong class="text-red-400">YOUTUBE</strong><br><span class="text-xl">${item.title}</span><br><br><span class="text-sm text-zinc-400">Duração: ${item.duration}</span>`;
            
            document.getElementById("modalText").innerHTML = html;
            document.getElementById("modalConfirm").classList.remove("hidden");
        }

        function fecharModal() {
            document.getElementById("modalConfirm").classList.add("hidden");
        }

        async function confirmarEnvio() {
            if (!currentSelected || !pairingId) return;
            
            let numero = currentMode === 1 
                ? (currentSelected.NUMERO || currentSelected.numero)
                : "youtube" + currentSelected.id;
            
            const url = `${URL_ENVIAR}${pairingId}&numero=${numero}`;
            try {
                await fetch(url);
                alert("✅ Enviado com sucesso!");
            } catch (e) {
                alert("❌ Erro ao enviar");
            }
            fecharModal();
        }

        async function cancelarMusica() {
            if (!pairingId) return alert("Faça login primeiro!");
            const url = `${URL_ENVIAR}${pairingId}&numero=11111111110`;
            try {
                await fetch(url);
                alert("⏹️ Música cancelada!");
            } catch (e) {
                alert("Erro ao cancelar");
            }
        }

        // ====================== INICIALIZAÇÃO ======================
        window.onload = () => {
            document.getElementById("searchInput").addEventListener("keypress", e => {
                if (e.key === "Enter") buscar();
            });
        };
    </script>
</body>
</html>
