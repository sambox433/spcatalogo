<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cartelas de Bingo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { text-align: center; }
        form { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #cartelas { max-width: 900px; margin: 30px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .cartela { background: white; padding: 15px; border: 2px solid #333; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        .cartela h3 { text-align: center; margin: 0 0 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #007bff; color: white; padding: 10px; font-size: 20px; }
        td { border: 1px solid #333; text-align: center; padding: 15px; font-size: 18px; font-weight: bold; }
        .free { background: #ffd700; }
        #status { text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Gerador de Cartelas de Bingo</h1>
    
    <form id="formCadastro">
        <label>ID (único para o cadastro):</label>
        <input type="text" id="id" required>
        
        <label>Senha (será o nome do ponto, ex: BAR JOAO):</label>
        <input type="text" id="senha" required>
        
        <label>Valor Meta (ex: 500.00):</label>
        <input type="text" id="meta" required>
        
        <label>Valor Prêmio (ex: 300.00):</label>
        <input type="text" id="premio" required>
        
        <label>Quantas cartelas gerar (ex: 20):</label>
        <input type="number" id="quantidade" min="1" max="100" value="20" required>
        
        <button type="button" onclick="gerarCartelas()">Gerar Cartelas e Salvar</button>
    </form>
    
    <div id="status"></div>
    
    <div id="cartelas"></div>

    <script>
        const apiUrl = "https://script.google.com/macros/s/AKfycbz71XFPU6Jooa-arRmlpey1vRPajcoHdOc74vHaS_PCX_LdIiNNWiKWVIhn8ytXTbRg/exec";

        function gerarCartela() {
            const colunas = [
                { letra: 'B', min: 1, max: 15 },
                { letra: 'I', min: 16, max: 30 },
                { letra: 'N', min: 31, max: 45 },
                { letra: 'G', min: 46, max: 60 },
                { letra: 'O', min: 61, max: 75 }
            ];

            const cartela = [];
            colunas.forEach((col, cIdx) => {
                const nums = [];
                while (nums.length < 5) {
                    const num = Math.floor(Math.random() * (col.max - col.min + 1)) + col.min;
                    if (!nums.includes(num)) nums.push(num);
                }
                nums.sort((a, b) => a - b);
                if (cIdx === 2) nums[2] = 'FREE'; // centro livre na coluna N
                cartela.push(nums);
            });

            // Formato plano: lista de números em ordem de leitura (linha por linha)
            const plana = [];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const val = cartela[col][row];
                    if (val !== 'FREE') plana.push(val);
                }
            }

            return { cartela, plana };
        }

        function exibirCartelas(cartelasArray) {
            const container = document.getElementById('cartelas');
            container.innerHTML = '';
            cartelasArray.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = 'cartela';
                div.innerHTML = `<h3>Cartela ${index + 1}</h3>`;
                const table = document.createElement('table');
                const thead = document.createElement('tr');
                'BINGO'.split('').forEach(letra => {
                    const th = document.createElement('th');
                    th.textContent = letra;
                    thead.appendChild(th);
                });
                table.appendChild(thead);

                for (let row = 0; row < 5; row++) {
                    const tr = document.createElement('tr');
                    for (let col = 0; col < 5; col++) {
                        const td = document.createElement('td');
                        const val = c.cartela[col][row];
                        if (val === 'FREE') {
                            td.textContent = 'FREE';
                            td.classList.add('free');
                        } else {
                            td.textContent = val;
                        }
                        tr.appendChild(td);
                    }
                    table.appendChild(tr);
                }
                div.appendChild(table);
                container.appendChild(div);
            });
        }

        async function salvarNoGoogleAppsScript(dados) {
            const params = new URLSearchParams();
            params.append('id', dados.id);
            params.append('ponto', dados.ponto);
            params.append('meta', dados.meta);
            params.append('premio', dados.premio);
            params.append('cartelas', dados.cartelasStr);

            const urlCompleta = `${apiUrl}?${params.toString()}`;

            try {
                const response = await fetch(urlCompleta, { method: 'GET' });
                const texto = await response.text();
                if (response.ok) {
                    document.getElementById('status').innerHTML = `<p style="color:green;">Salvo com sucesso!<br>URL gerada: <a href="${urlCompleta}" target="_blank">${urlCompleta}</a></p>`;
                } else {
                    document.getElementById('status').innerHTML = `<p style="color:red;">Erro ao salvar: ${texto}</p>`;
                }
            } catch (err) {
                document.getElementById('status').innerHTML = `<p style="color:red;">Erro de rede: ${err.message}</p>`;
            }
        }

        function gerarCartelas() {
            const id = document.getElementById('id').value.trim();
            const ponto = document.getElementById('senha').value.trim(); // senha = nome do ponto
            const meta = document.getElementById('meta').value.trim();
            const premio = document.getElementById('premio').value.trim();
            const qtd = parseInt(document.getElementById('quantidade').value);

            if (!id || !ponto || !meta || !premio || qtd < 1) {
                alert('Preencha todos os campos corretamente!');
                return;
            }

            const cartelasArray = [];
            const cartelasPlanas = [];

            for (let i = 0; i < qtd; i++) {
                const { cartela, plana } = gerarCartela();
                cartelasArray.push({ cartela });
                cartelasPlanas.push(`(${plana.join(' ')})`);
            }

            exibirCartelas(cartelasArray);

            const cartelasStr = cartelasPlanas.join(' ');

            // Salva na API (usando GET com parâmetros na URL, como no exemplo fornecido)
            salvarNoGoogleAppsScript({
                id,
                ponto,
                meta,
                premio,
                cartelasStr
            });
        }
    </script>
</body>
</html>
